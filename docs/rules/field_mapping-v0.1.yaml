schema_version: "1.0"
stage: "S1"
owner: "qxt"
purpose: "S1 baseline field aliases and normalization contract for parser, model_review, and rules_engine."

structured_field_contract:
  required_keys:
    - field
    - value
    - source_type
    - page
    - snippet
  optional_keys:
    - confidence
    - image_ref
    - bbox
  source_type_values:
    - text
    - image_ocr

fields:
  - field: "crypto.rsa.key_length"
    priority: "P0"
    value_type: "integer_string"
    canonical_examples:
      - "2048"
      - "3072"
      - "4096"
    aliases:
      - "rsa_key_length"
      - "rsa_bits"
      - "rsa.length"
      - "public_key_bits"
      - "modulus_bits"
      - "key_length"
      - "RSA2048"
      - "RSA-2048"
      - "2048-bit RSA"
      - "RSA 3072"
    extraction_patterns:
      - "\\bRSA\\s*[-_ ]?(\\d{3,4})\\b"
      - "\\b(\\d{3,4})\\s*[-_ ]?bit\\s+RSA\\b"
      - "\\bkey\\s*length\\s*:?\\s*(\\d{3,4})\\b"
    normalization_rule: "Extract numeric bit length and store as string."
    s1_policy: ">=3072 PASS, 2048 REVIEW, <2048 FAIL, missing or invalid REVIEW."

  - field: "crypto.tls.version"
    priority: "P0"
    value_type: "version_string"
    canonical_examples:
      - "1.0"
      - "1.1"
      - "1.2"
      - "1.3"
    aliases:
      - "tls_version"
      - "tls.ver"
      - "protocol_version"
      - "ssl_tls_version"
      - "TLS1.0"
      - "TLS1.1"
      - "TLS1.2"
      - "TLS1.3"
      - "TLS v1.2"
      - "SSL 3.0"
    extraction_patterns:
      - "\\bTLS\\s*v?\\s*([0-9](?:\\.[0-9])?)\\b"
      - "\\bSSL\\s*v?\\s*([0-9](?:\\.[0-9])?)\\b"
    normalization_rule: "Extract version number and store as string without TLS prefix."
    s1_policy: ">=1.2 PASS, 1.1 REVIEW, <=1.0 FAIL, missing or invalid REVIEW."

  - field: "crypto.weak"
    priority: "P0"
    value_type: "keyword_list"
    canonical_examples:
      - "MD5"
      - "SHA-1"
      - "DES"
      - "3DES"
      - "RC4"
      - "ECB"
    aliases:
      - "weak_algorithm"
      - "weak_crypto"
      - "crypto.weak_algorithm"
      - "hash_algorithm"
      - "cipher_algorithm"
      - "block_mode"
      - "MD5"
      - "SHA1"
      - "SHA-1"
      - "DES"
      - "3DES"
      - "RC4"
      - "ECB"
    extraction_patterns:
      - "\\bMD5\\b"
      - "\\bSHA[\\s_-]?1\\b"
      - "\\bDES\\b"
      - "\\b3DES\\b"
      - "\\bRC4\\b"
      - "\\bECB\\b"
    normalization_rule: "Collect matched weak algorithm keywords using canonical uppercase names."
    s1_policy: "Any hit REVIEW, no hit PASS."

metadata_fields:
  - field: "source_type"
    allowed_values:
      - "text"
      - "image_ocr"
    description: "Origin of extracted value."
  - field: "page"
    value_type: "integer"
    description: "Source page number. Unknown page should be 0 in S1."
  - field: "snippet"
    value_type: "string"
    description: "Shortest reproducible evidence fragment."

review_rules:
  - "P0 fields must preserve the original snippet."
  - "Aliases in this file are the only accepted S1 field aliases."
  - "New aliases require updating this file and S1 sample cases in the same PR."
