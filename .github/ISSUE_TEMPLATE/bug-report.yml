name: Bug Report
description: 缺陷与异常问题上报
title: "[Bug][module] 简要标题"
labels:
  - type:bug
body:
  - type: dropdown
    id: severity
    attributes:
      label: 严重级别
      options:
        - P0 阻断
        - P1 高
        - P2 中
        - P3 低
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 影响模块
      options:
        - parser
        - ocr
        - rules
        - model
        - web
        - evidence
        - deploy
        - ci
    validations:
      required: true

  - type: textarea
    id: desc
    attributes:
      label: 问题描述
      placeholder: 描述现象和影响
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 1 2 3
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 可粘贴关键日志
